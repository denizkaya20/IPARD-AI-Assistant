# .github/workflows/huggingface.yml dosyasını güncelleyin
name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true  # LFS'i aktif et!
      - name: Push to HF with LFS
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # LFS dosyalarını çek
          git lfs pull
          
          HF_URL="https://denizkaya2022:${HF_TOKEN}@huggingface.co/spaces/denizkaya2022/IPARD-AI-Assistant"
          git remote add hf "$HF_URL"
          git push hf main --force
