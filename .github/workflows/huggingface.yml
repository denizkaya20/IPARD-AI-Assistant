name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'src/data/**'
      - '*.npy'
      - '*.json'
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: false
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git config lfs.allowincompletepush true
          echo "data/" >> .gitignore
          echo "src/data/" >> .gitignore
          echo "*.npy" >> .gitignore
          echo "*.json" >> .gitignore
          git add .gitignore || true
          HF_URL="https://denizkaya2022:${HF_TOKEN}@huggingface.co/spaces/denizkaya2022/IPARD-AI-Assistant"
          git push "$HF_URL" main:main --force