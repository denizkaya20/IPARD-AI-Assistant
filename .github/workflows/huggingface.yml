name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: false
      - name: Install git-filter-repo
        run: pip install git-filter-repo
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git filter-repo --force --invert-paths \
            --path data/all_chunks.json \
            --path data/embeddings.npy \
            --path data/.gitkeep \
            --path src/data/chromadb/chroma.sqlite3 \
            --path src/data/all_chunks.json
          HF_URL="https://denizkaya2022:${HF_TOKEN}@huggingface.co/spaces/denizkaya2022/IPARD-AI-Assistant"
          git remote add hf "$HF_URL"
          git push hf main --force
