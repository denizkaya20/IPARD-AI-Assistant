name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: false
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote remove hf || true
          git remote add hf https://denizkaya2022:$HF_TOKEN@huggingface.co/spaces/denizkaya2022/IPARD-AI-Assistant
          git fetch hf main
          git checkout -b deploy
          git checkout hf/main -- data/ || true
          git add data/ || true
          git push hf deploy:main --force
