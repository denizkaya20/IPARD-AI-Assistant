name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Install Git LFS
        run: git lfs install
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git lfs track "data/all_chunks.json"
          git lfs track "data/embeddings.npy"
          git remote remove hf || true
          git remote add hf https://denizkaya2022:$HF_TOKEN@huggingface.co/spaces/denizkaya2022/IPARD-AI-Assistant
          git push --force hf main
