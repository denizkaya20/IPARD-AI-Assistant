name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git kimlik bilgilerini tanımla
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Uzak sunucu (hf) zaten varsa sil, temiz kurulum yap
          git remote remove hf || true
          
          # Token ile uzak sunucuyu ekle
          git remote add hf https://denizkaya2022:$HF_TOKEN@huggingface.co/spaces/denizkaya2022/IPARD-AI-Assistant
          
          # Zorla gönder (LFS desteği ile)
          git push --force hf main